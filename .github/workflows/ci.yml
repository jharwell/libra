name: Build and test

# Run:
#
# - Every month. Scheduling helps keep drift/issues with updates
#   to runners at bay.
# - On pushes to relevant paths.
#
on:
  push:
    paths:
      - "cmake/**"
      - "cli/**"
      - ".github/**"
      - "docs/**"

  schedule:
    - cron: '0 0 1 * *'


concurrency:
  group: "build-and-test-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  cmake-funcs-smoke-tests:
    runs-on: ubuntu-latest
    container:
      image: jharwell/ubuntu24.04-libra:2026-03-16
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke tests
        shell: bash
        run: |
          cd tests && mkdir -p build && cd build
          cmake ..
          ctest --output-on-failure -j $(nproc)


  cmake-add-subdirectory-smoke-tests:
    uses: ./.github/workflows/smoke-tests-compiler-matrix.yml
    with:
      suite-script: ./suites/run_suite_add_subdirectory.sh
      full-matrix: ${{ github.ref_name == 'devel' || github.ref_name == 'master' }}

  cmake-installed-pkg-smoke-tests:
    uses: ./.github/workflows/smoke-tests-compiler-matrix.yml
    with:
      suite-script: ./suites/run_suite_installed_package.sh
      full-matrix: ${{ github.ref_name == 'devel' || github.ref_name == 'master' }}

  cmake-cpm-smoke-tests:
    uses: ./.github/workflows/smoke-tests-compiler-matrix.yml
    with:
      suite-script: ./suites/run_suite_cpm.sh
      full-matrix: ${{ github.ref_name == 'devel' || github.ref_name == 'master' }}

  cmake-conan-smoke-tests:
    uses: ./.github/workflows/smoke-tests-compiler-matrix.yml
    with:
      suite-script: ./suites/run_suite_conan.sh
      full-matrix: ${{ github.ref_name == 'devel' || github.ref_name == 'master' }}
      pip-install-conan: true

  schema-help-targets:
    runs-on: ubuntu-latest
    container:
      image: jharwell/ubuntu24.04-libra:2026-03-16
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Run LIBRA install
        shell: bash
        run: |
          cd tests/sample_basic
          cmake .
          uv run check-jsonschema --schemafile ../../schema/help-targets.yaml libra_targets.json


  cmake-self-install-test:
    runs-on: ubuntu-latest
    container:
      image: jharwell/ubuntu24.04-libra:2026-03-16
    steps:
      - uses: actions/checkout@v4
      - name: Run LIBRA install
        shell: bash
        run: |
          mkdir -p build && cd build
          cmake ..
          make install

  cli-build:
    runs-on: ubuntu-latest
    container:
      image: jharwell/ubuntu24.04-libra:2026-03-16
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: cargo build
        working-directory: .

  cli-unit-tests:
    runs-on: ubuntu-latest
    container:
      image: jharwell/ubuntu24.04-libra:2026-03-16
    needs:
      - cli-build
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run Rust unit tests
        run: cargo test
        working-directory: .

  cli-smoke-tests:
    runs-on: ubuntu-latest
    container:
      image: jharwell/ubuntu24.04-libra:2026-03-16
    needs:
      - cli-build
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run CLI BATS smoke tests
        shell: bash
        run: |
          cargo build
          bats tests/cli_*.bats -j $(nproc)
        working-directory: ${{ github.workspace }}
        env:
          CLIBRA_BIN: ${{ github.workspace }}/target/debug/clibra

  docs:
    if: github.ref_name == 'master'
    uses: ./.github/workflows/pages.yml
    needs:
      - cmake-funcs-smoke-tests
      - cmake-add-subdirectory-smoke-tests
      - cmake-cpm-smoke-tests
      - cmake-conan-smoke-tests
      - cmake-installed-pkg-smoke-tests
      - cmake-self-install-test
      - cli-smoke-tests
      - cli-unit-tests
      - schema-help-targets
    secrets: inherit

  create-conan-pkg:
    # Only publish packages from master
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    needs:
      - cmake-funcs-smoke-tests
      - cmake-add-subdirectory-smoke-tests
      - cmake-cpm-smoke-tests
      - cmake-conan-smoke-tests
      - cmake-installed-pkg-smoke-tests
      - cmake-self-install-test
      - cli-smoke-tests
      - cli-unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Create package
        shell: bash
        run: |
          pip3 install conan
          conan profile detect
          conan create \
            --user jharwell \
            --lockfile-out=package.lock \
            .

  tag-dev-release:
    # Runs after every merge to devel. Computes the next dev.N tag and
    # pushes it so downstream repos can consume a stable reference to
    # this integration state without pinning to a raw commit hash.
    #
    # Tag selection algorithm:
    #   1. If a dev tag series exists for the next version (e.g.
    #      v1.5.0-dev.3) and no stable release for that base exists yet:
    #      increment N  ->  v1.5.0-dev.4
    #   2. If the latest dev tag's base version has since been released
    #      as stable (v1.5.0 exists): start a new patch series
    #      ->  v1.5.1-dev.1
    #   3. No dev tags at all: find latest stable and start new patch
    #      series  ->  v(X.Y.Z+1)-dev.1
    #   4. No tags at all: bootstrap at v0.0.1-dev.1
    #
    # GITHUB_TOKEN is sufficient here -- dev tag pushes do not need to
    # trigger publish.yml (which only fires on GitHub releases from
    # master). The tag push will re-trigger this workflow but all jobs
    # guard on ref_type == 'branch' so only create-release re-evaluates
    # (and its !contains('-') guard excludes dev tags).
    if: github.ref_type == 'branch' && github.ref_name == 'devel'
    runs-on: ubuntu-latest
    container:
      image: jharwell/ubuntu24.04-libra:2026-03-16
    permissions:
      contents: write
    # needs:
    #   - cmake-funcs-smoke-tests
    #   - cmake-add-subdirectory-smoke-tests
    #   - cmake-cpm-smoke-tests
    #   - cmake-conan-smoke-tests
    #   - cmake-installed-pkg-smoke-tests
    #   - cmake-self-install-test
    #   - cli-smoke-tests
    #   - cli-unit-tests
    #   - schema-help-targets
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required to inspect all existing tags.
          fetch-depth: 0

      - name: Compute and push next dev tag
        shell: bash
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

          # Ensure full history + tags are available.
          git fetch --force --tags

          git tag -l

          # Locate the most recent dev tag across all series.
          LATEST_DEV=$(
            git tag --list --sort=-v:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-dev\.[0-9]+$' \
              | head -1 || true
          )
          echo $LATEST_DEV
          if [ -n "$LATEST_DEV" ]; then
            BASE=$(echo "$LATEST_DEV" | sed -E 's/^v//; s/-dev\..*//')
            N=$(echo "$LATEST_DEV" | sed -E 's/.*-dev\.([0-9]+)/\1/')

            # If a stable release for this base already exists, the dev
            # series has been promoted -- start a new patch series.
            if git tag --list | grep -qx "v${BASE}"; then
              IFS='.' read -r MAJ MIN PAT <<< "$BASE"
              NEW_TAG="v${MAJ}.${MIN}.$((PAT + 1))-dev.1"
            else
              NEW_TAG="v${BASE}-dev.$((N + 1))"
            fi
          else
            # No dev tags yet -- derive base from latest stable tag.
            LATEST_STABLE=$(
              git tag --list --sort=-v:refname \
                | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                | head -1 || true
            )

            if [ -n "$LATEST_STABLE" ]; then
              BASE=$(echo "$LATEST_STABLE" | sed 's/^v//')
              IFS='.' read -r MAJ MIN PAT <<< "$BASE"
              NEW_TAG="v${MAJ}.${MIN}.$((PAT + 1))-dev.1"
            else
              NEW_TAG="v0.0.1-dev.1"
            fi
          fi

          echo "New dev tag: ${NEW_TAG}"

          # Fail clearly if another workflow already created the tag.
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $NEW_TAG"
            exit 1
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$NEW_TAG"
          git push origin "refs/tags/$NEW_TAG"
