name: Release

# Triggered by a manually-pushed stable tag (e.g. v1.5.0).
#
# Keeping this in a dedicated workflow rather than in ci.yml avoids the
# GitHub Actions footgun where mixing `tags:` and `paths:` under the same
# `push:` trigger changes evaluation semantics and can suppress branch push
# runs unexpectedly.
#
# The human is responsible for verifying that CI passed on master before
# pushing the tag. No test jobs here -- the tag itself is the assertion.
#
# Uses BOT_RELEASE_TOKEN rather than GITHUB_TOKEN so that creating the
# GitHub release triggers the publish workflow. A workflow cannot trigger
# another workflow with the same token it was invoked with.
on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  create-release:
    # Exclude prerelease tags (v1.5.0-dev.3, v1.5.0-rc.1).
    # Only clean vX.Y.Z tags produce GitHub releases.
    if: "!contains(github.ref_name, '-')"
    runs-on: ubuntu-latest
    container:
      image: jharwell/ubuntu24.04-libra:2026-03-16
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bake version into self.cmake
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          cat > cmake/libra/self.cmake << EOF
          # GENERATED FILE -- do not edit.
          # Updated automatically by CI in the create-release job.
          # Any manual changes will be overwritten on the next release.
          set(LIBRA_VERSION "${VERSION}")
          EOF

          # Move the tag to include the self.cmake commit so CPM
          # consumers get the correct version from the source tree.
          git add cmake/libra/self.cmake
          git commit -m "chore: update LIBRA_VERSION to ${{ github.ref_name }}"
          git tag -f "${{ github.ref_name }}"
          git push origin HEAD:master --force-with-lease
          git push origin "${{ github.ref_name }}" --force

      - name: Github release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: ${{ secrets.BOT_RELEASE_TOKEN }}
          automatic_release_tag: ${{ github.ref_name }}
          prerelease: false
          title: "Release ${{ github.ref_name }}"
