$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "libra-help-targets.schema.yaml"
title: LibraHelpTargets
description: Output of the help-targets-json cmake target
type: object
required: [schema_version, project, targets]
additionalProperties: false

properties:
  schema_version:
    type: integer
    const: 1
  project:
    type: string
    description: CMAKE_PROJECT_NAME
  targets:
    type: array
    items:
      $ref: "#/$defs/target"

$defs:
  target:
    type: object
    required: [name, available, category]
    additionalProperties: false
    properties:
      name:
        type: string
        description: The make/ninja target name
      available:
        type: boolean
        description: Whether the target is currently enabled
      unavailable_reason:
        type: [string, "null"]
        description: >
          The LIBRA_FOO=OFF string when available=false,
          null when available=true
      category:
        type: string
        enum: [test, docs, coverage, analysis, format, fix]
      parent:
        type: [string, "null"]
        description: >
          Umbrella target name, e.g. 'analyze-clang-tidy' for
          'analyze-clang-tidy-bugprone'. Null for top-level targets.
